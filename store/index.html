<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chitralok Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#f2f2f2;}

.container{
  max-width:1200px;
  margin:20px auto;
  padding:10px;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:15px 20px;
  border-radius:12px;
  margin-bottom:20px;
}

.cart-btn{
  background:#111;
  color:white;
  padding:8px 15px;
  border-radius:8px;
  text-decoration:none;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.product{
  background:white;
  padding:12px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}
.product:hover{
  transform:translateY(-5px);
}

.product img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.product h3{
  font-size:15px;
  margin:8px 0;
}

.product p{
  font-weight:bold;
}

.product button{
  margin-top:8px;
  padding:8px;
  font-size:13px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
  width:100%;
}
</style>
</head>

<body>

<div class="container">

<nav>
  <h2>Chitralok Store</h2>

  <a href="../cart/index.html" class="cart-btn">
    View Cart 🛒
  </a>
</nav>

<div class="products" id="products"></div>

</div>

<script>

/* LOAD DATA */
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SAVE CART */
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* RENDER PRODUCTS */
function renderProducts(){
  let html = "";

  if(products.length === 0){
    html = "<p>No products available</p>";
  }

  products.forEach((p,i)=>{

    let inCart = cart.find(c => c.name === p.name);

    html += `
      <div class="product">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>

        ${
          p.out
          ? `<button disabled>Out of Stock</button>`
          : inCart
            ? `<button onclick="removeFromCart(${i})" style="background:red;">Remove</button>`
            : `<button onclick="addToCart(${i})">Add to Cart</button>`
        }
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* ADD */
function addToCart(i){
  let item = products[i];
  let found = cart.find(c => c.name === item.name);

  if(found){
    found.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  saveCart();
  renderProducts();
}

/* REMOVE */
function removeFromCart(i){
  let name = products[i].name;
  cart = cart.filter(c => c.name !== name);

  saveCart();
  renderProducts();
}

/* INIT */
renderProducts();

</script>

</body>
</html>
