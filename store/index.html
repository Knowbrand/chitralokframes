<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chitralok Store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#f2f2f2;
}

.container{
  max-width:1100px;
  margin:20px auto;
  padding:10px;
}

/* NAV */
nav{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  background:white;
  padding:15px 20px;
  border-radius:12px;
  margin-bottom:20px;
}

nav h2{
  text-align:center;
}

.back-btn{
  background:#ddd;
  color:#111;
  padding:8px 12px;
  border-radius:8px;
  text-decoration:none;
  font-size:14px;
  width:max-content;
}

.cart-btn{
  justify-self:end;
  background:#111;
  color:white;
  padding:8px 15px;
  border-radius:8px;
  text-decoration:none;
  font-size:14px;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

/* CARD */
.product{
  background:#f8f8f8;
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition:0.2s;
}

.product:hover{
  transform:scale(1.03);
}

.product img{
  width:100%;
  height:130px;
  object-fit:contain;
  margin-bottom:10px;
}

.product h3{
  font-size:14px;
  font-weight:500;
  margin-bottom:5px;
}

.product p{
  font-size:13px;
  color:#666;
}

/* BUTTON */
.add-btn{
  margin-top:10px;
  width:35px;
  height:35px;
  border-radius:50%;
  border:none;
  background:black;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.remove-btn{
  background:red;
}

</style>
</head>

<body>

<div class="container">

<nav>
  <a href="../index.html" class="back-btn">← Home</a>

  <h2>Chitralok Store</h2>

  <a href="./cart/index.html" class="cart-btn">
    View Cart 🛒
  </a>
</nav>

<div class="products" id="products"></div>

</div>

<script>

/* LOAD DATA */
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SAVE CART */
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* RENDER PRODUCTS */
function renderProducts(){
  let html = "";

  if(products.length === 0){
    html = "<p>No products available</p>";
  }

  products.forEach((p,i)=>{

    let inCart = cart.find(c => c.name === p.name);

    html += `
      <div class="product">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>

        ${
          p.out
          ? `<button disabled class="add-btn">×</button>`
          : inCart
            ? `<button class="add-btn remove-btn" onclick="removeFromCart(${i})">−</button>`
            : `<button class="add-btn" onclick="addToCart(${i})">+</button>`
        }
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* ADD TO CART */
function addToCart(i){
  let item = products[i];
  let found = cart.find(c => c.name === item.name);

  if(found){
    found.qty++;
  } else {
    cart.push({...item, qty:1});
  }

  saveCart();
  renderProducts();
}

/* REMOVE FROM CART */
function removeFromCart(i){
  let name = products[i].name;
  cart = cart.filter(c => c.name !== name);

  saveCart();
  renderProducts();
}

/* INIT */
renderProducts();

</script>

</body>
</html>
