<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px;}
input,button{padding:10px;margin:5px;}
.product{background:white;padding:10px;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>Product Manager</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>

<div id="list"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

function render(){
  let html = "";

  products.forEach((p,i)=>{
    html += `
      <div class="product">
        <b>${p.name}</b> - ₹${p.price} ${p.out ? "(Out of Stock)" : ""}
        <br>
        <button onclick="toggleStock(${i})">Toggle Stock</button>
        <button onclick="deleteProduct(${i})">Delete</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let img = document.getElementById("img").value;

  products.push({name,price,img,out:false});
  save();
  render();
}

function deleteProduct(i){
  products.splice(i,1);
  save();
  render();
}

function toggleStock(i){
  products[i].out = !products[i].out;
  save();
  render();
}

render();
</script>

</body>
</html>
