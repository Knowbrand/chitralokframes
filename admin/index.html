<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#111;
  color:white;
  font-family:sans-serif;
}
.box{
  background:#222;
  padding:30px;
  border-radius:15px;
  text-align:center;
}
input{
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
}
button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#c9b8a6;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Enter Password</h2>
  <input type="password" id="pass" placeholder="Password"><br>
  <button onclick="check()">Login</button>
</div>

<script>
function check(){
  if(document.getElementById("pass").value === "1234"){
    sessionStorage.setItem("admin","true");
    window.location.href = "panel/index.html";
  } else {
    window.location.href = "../index.html";
  }
}
</script>

</body>
</html>
