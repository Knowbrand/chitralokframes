<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:sans-serif;
  background:#f5f5f5;
}

.box{
  background:white;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:10px;
  margin-top:15px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Admin Access</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  const password = "1234"; // 🔴 change this
  let input = document.getElementById("pass").value;

  if(input === password){
    sessionStorage.setItem("admin","true"); // ✅ session only
    window.location.replace = "panel/";
  } else {
    document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;'>Access Denied</h1>";
  }
}

/* prevent going back after logout */
history.pushState(null, null, location.href);
window.onpopstate = function () {
  history.go(1);
};
</script>

</body>
</html>
