<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px;}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
input,button{padding:10px;margin:5px;}
.product{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
.logout{
  background:red;
  color:white;
}
</style>

<script>
/* 🔐 PROTECT PAGE */
if(sessionStorage.getItem("admin") !== "true"){
  window.location.href = "../index.html";
}

/* prevent back access */
history.pushState(null, null, location.href);
window.onpopstate = function () {
  history.go(1);
};
</script>

</head>
  
<script>
if(sessionStorage.getItem("admin") !== "true"){
  window.location.replace("../index.html");
}
</script>
  
<body>

<div class="top">
  <h2>Product Manager</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>

<div id="list"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function save(){
  try{
    localStorage.setItem("products", JSON.stringify(products));
  } catch(e){
    alert("Storage full!");
  }
}

function render(){
  let html = "";

  products.forEach((p,i)=>{
    html += `
      <div class="product">
        <b>${p.name}</b> - ₹${p.price} ${p.out ? "(Out of Stock)" : ""}
        <br>
        <button onclick="toggleStock(${i})">Toggle Stock</button>
        <button onclick="deleteProduct(${i})">Delete</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let img = document.getElementById("img").value;

  if(!name || !price || !img){
    alert("Fill all fields");
    return;
  }

  products.push({name,price,img,out:false});
  save();
  render();
}

function deleteProduct(i){
  products.splice(i,1);
  save();
  render();
}

function toggleStock(i){
  products[i].out = !products[i].out;
  save();
  render();
}

/* 🔓 LOGOUT */
function logout(){
  sessionStorage.removeItem("admin");
  window.location.href = "../index.html";
}

render();
</script>

</body>
</html>
