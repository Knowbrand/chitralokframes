<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chitralok Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#f2f2f2;}

.container{max-width:1200px;margin:20px auto;}

/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;background:white;padding:15px 20px;border-radius:10px;margin-bottom:20px;}
nav h2{color:#111;}

/* PRODUCTS */
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;}
.product{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);} 
.product img{width:100%;height:150px;object-fit:cover;border-radius:8px;}
.product h3{margin:10px 0;}
.product p{color:#666;}
button{margin-top:8px;padding:8px;border:none;background:#ff9900;color:white;border-radius:5px;cursor:pointer;width:100%;}

/* CART */
.cart{background:white;padding:15px;border-radius:10px;margin-top:20px;}
.cart-item{display:flex;justify-content:space-between;align-items:center;margin:10px 0;}
.cart-item button{width:auto;padding:5px 10px;margin-left:5px;}

/* ADMIN */
.admin{background:white;padding:15px;border-radius:10px;margin-top:20px;}
.admin input{margin:5px 0;padding:8px;width:100%;}

</style>
</head>

<body>
<div class="container">

<nav>
  <h2>Chitralok Store</h2>
</nav>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: ₹<span id="total">0</span></h4>
  <button onclick="checkout()">Checkout</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin">
  <h3>Admin Panel</h3>
  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price" type="number">
  <input id="img" placeholder="Image URL">
  <button onclick="addProduct()">Add Product</button>
</div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>

let products = JSON.parse(localStorage.getItem('products')) || [
  {name:'Shivaji Frame',price:1500,img:'https://images.unsplash.com/photo-1504196606672-aef5c9cefc92'},
  {name:'Swami Frame',price:1200,img:'https://images.unsplash.com/photo-1492724441997-5dc865305da7'}
];

let cart = [];

function renderProducts(){
  let html='';
  products.forEach((p,i)=>{
    html+=`<div class="product">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${i})">Add to Cart</button>
    </div>`;
  });
  document.getElementById('products').innerHTML=html;
}

function addProduct(){
  let name=document.getElementById('name').value;
  let price=document.getElementById('price').value;
  let img=document.getElementById('img').value;

  products.push({name,price,img});
  localStorage.setItem('products',JSON.stringify(products));
  renderProducts();
}

function addToCart(i){
  let item = products[i];
  let found = cart.find(c=>c.name===item.name);

  if(found){found.qty++;}
  else{cart.push({...item,qty:1});}

  renderCart();
}

function renderCart(){
  let html='';
  let total=0;

  cart.forEach((item,i)=>{
    total+=item.price*item.qty;
    html+=`<div class="cart-item">
      ${item.name} x${item.qty} - ₹${item.price*item.qty}
      <div>
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="changeQty(${i},-1)">-</button>
        <button onclick="removeItem(${i})">x</button>
      </div>
    </div>`;
  });

  document.getElementById('cartItems').innerHTML=html;
  document.getElementById('total').innerText=total;
}

function changeQty(i,val){
  cart[i].qty+=val;
  if(cart[i].qty<=0) cart.splice(i,1);
  renderCart();
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

function checkout(){
  let total=0;
  cart.forEach(i=> total+=i.price*i.qty);

  // store order locally (demo database)
  let orders = JSON.parse(localStorage.getItem('orders')) || [];
  orders.push({cart,total,date:new Date()});
  localStorage.setItem('orders',JSON.stringify(orders));

  var options={
    key:"YOUR_RAZORPAY_KEY",
    amount: total*100,
    currency:"INR",
    name:"Chitralok",
    description:"Order Payment",
    handler:function(){alert('Payment Successful');}
  };

  var rzp=new Razorpay(options);
  rzp.open();
}

renderProducts();
</script>

</body>
</html>
